
# ── Shared Airflow config block ────────────────────────────────
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
    target: airflow
  env_file: .env
  environment: &airflow-common-env
    # Core
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # DB
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${POSTGRES_HOST}/${AIRFLOW_DB}
    # Webserver
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    # Connections (available inside DAGs via os.getenv)
    MINIO_ENDPOINT: http://${MINIO_HOST}:${MINIO_API_PORT}
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    MINIO_SOURCE_BUCKET: ${MINIO_SOURCE_BUCKET}
    MINIO_ARCHIVE_BUCKET: ${MINIO_ARCHIVE_BUCKET}
    POSTGRES_HOST: ${POSTGRES_HOST}
    POSTGRES_PORT: ${POSTGRES_PORT}
    POSTGRES_DB: ${SALES_DB}
    POSTGRES_USER: ${SALES_DB_USER}
    POSTGRES_PASSWORD: ${SALES_DB_PASSWORD}
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  # ── 1. PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mdp-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. MinIO ─────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: mdp-minio
    restart: unless-stopped
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates buckets on first boot
  minio-init:
    image: minio/mc:latest
    container_name: mdp-minio-init
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://${MINIO_HOST}:${MINIO_API_PORT} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/${MINIO_SOURCE_BUCKET};
        mc mb --ignore-existing local/${MINIO_ARCHIVE_BUCKET};
        echo 'MinIO buckets ready';
      "

  # ── 3. Apache Airflow ────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: mdp-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL} \
          --password ${AIRFLOW_ADMIN_PASSWORD}
        echo "Airflow initialised"
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    container_name: mdp-airflow-webserver
    restart: unless-stopped
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: mdp-airflow-scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── 4. Metabase ──────────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: mdp-metabase
    restart: unless-stopped
    env_file: .env
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: ${POSTGRES_HOST}
      MB_DB_PORT: ${POSTGRES_PORT}
      MB_DB_DBNAME: ${METABASE_DB}
      MB_DB_USER: ${POSTGRES_ADMIN_USER}
      MB_DB_PASS: ${POSTGRES_ADMIN_PASSWORD}
      JAVA_OPTS: "-Xmx512m"
    ports:
      - "${METABASE_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ── 5. Data Generator (one-shot) ─────────────────────────────
  data-generator:
    build:
      context: .
      dockerfile: Dockerfile
      target: generator
    container_name: mdp-data-generator
    env_file: .env
    environment:
      MINIO_ENDPOINT: http://${MINIO_HOST}:${MINIO_API_PORT}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SOURCE_BUCKET: ${MINIO_SOURCE_BUCKET}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  postgres-data:
  minio-data:
  airflow-logs:
  airflow-plugins:

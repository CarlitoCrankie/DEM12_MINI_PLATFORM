# ──────────────────────────────────────────────────────────────────────────────
#  Mini Data Platform — Continuous Integration
#
#  Triggered on every push to any branch and on every PR targeting main.
#
#  Jobs (run in parallel where possible):
#    lint             → flake8 across dags/, data-generator/, tests/
#    unit-tests       → pytest test_generator.py + test_dags.py  (no services)
#    build            → docker build --target airflow + --target generator
#    integration-test → postgres + minio + data-generator → pytest test_integration.py
#    security-scan    → pip-audit on requirements.txt
#
#  Dependency graph:
#    lint ──┬──▶ unit-tests ──▶ integration-test
#           ├──▶ build      ──▶ integration-test
#           └──▶ security-scan
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new push arrives
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  AIRFLOW_VERSION: "2.8.0"

# ── 1. LINT ───────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Lint — DAGs
        run: |
          flake8 dags/ \
            --max-line-length=120 \
            --ignore=E402,W503,E501 \
            --format="::error file=%(path)s,line=%(row)d,col=%(col)d::%(text)s"

      - name: Lint — data-generator
        run: |
          flake8 data-generator/ \
            --max-line-length=120 \
            --ignore=E402,W503,E501 \
            --format="::error file=%(path)s,line=%(row)d,col=%(col)d::%(text)s"

      - name: Lint — tests
        run: |
          flake8 tests/ \
            --max-line-length=120 \
            --ignore=E402,W503,E501 \
            --format="::error file=%(path)s,line=%(row)d,col=%(col)d::%(text)s"

# ── 2. UNIT TESTS ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (no services)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # Airflow must be installed before its constraints are satisfied.
      # We pin it to avoid nondeterminism and use the official constraints file.
      - name: Install Apache Airflow ${{ env.AIRFLOW_VERSION }}
        run: |
          pip install --upgrade pip
          pip install "apache-airflow==${{ env.AIRFLOW_VERSION }}" \
            --constraint \
            "https://raw.githubusercontent.com/apache/airflow/constraints-${{ env.AIRFLOW_VERSION }}/constraints-${{ env.PYTHON_VERSION }}.txt"

      # Install project deps on top of Airflow (requirements.txt must exist)
      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Install pytest
        run: pip install pytest pytest-cov

      # test_dags.py auto-skips on Windows — we are on Linux so it runs fully
      - name: Run generator unit tests
        run: |
          python -m pytest tests/test_generator.py \
            -v --tb=short \
            --junitxml=reports/unit-generator.xml

      - name: Run DAG structure tests
        run: |
          python -m pytest tests/test_dags.py \
            -v --tb=short \
            --junitxml=reports/unit-dags.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: reports/

# ── 3. DOCKER BUILD ───────────────────────────────────────────────────────────
  build:
    name: Docker Build (both stages)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cache layers in GitHub Actions cache to speed up repeated builds
      - name: Build — airflow stage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: airflow
          push: false
          tags: mdp-airflow:ci
          cache-from: type=gha,scope=airflow
          cache-to: type=gha,mode=max,scope=airflow

      - name: Build — generator stage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: generator
          push: false
          tags: mdp-generator:ci
          cache-from: type=gha,scope=generator
          cache-to: type=gha,mode=max,scope=generator

# ── 4. INTEGRATION TESTS ─────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests (postgres + minio)
    runs-on: ubuntu-latest
    needs: [unit-tests, build]

    # These values are only for the CI test environment — not secrets
    env:
      POSTGRES_ADMIN_USER: admin
      POSTGRES_ADMIN_PASSWORD: adminpass
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      SALES_DB: salesdb
      SALES_DB_USER: datauser
      SALES_DB_PASSWORD: datapass
      MINIO_HOST: minio
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      MINIO_API_PORT: 9000
      MINIO_CONSOLE_PORT: 9001
      MINIO_SOURCE_BUCKET: sales-data
      MINIO_ARCHIVE_BUCKET: processed-data
      AIRFLOW_FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
      AIRFLOW_SECRET_KEY: "ci-secret-key"
      AIRFLOW_DB_USER: airflow
      AIRFLOW_DB_PASSWORD: airflow
      AIRFLOW_DB: airflow
      AIRFLOW_ADMIN_USER: admin
      AIRFLOW_ADMIN_EMAIL: admin@mdp.local
      AIRFLOW_ADMIN_PASSWORD: admin
      AIRFLOW_WEBSERVER_PORT: 8080
      METABASE_DB: metabase
      METABASE_PORT: 3000

    steps:
      - uses: actions/checkout@v4

      # Write a minimal .env so docker compose can resolve all variables
      - name: Write .env for docker compose
        run: |
          cat > .env << 'EOF'
          POSTGRES_ADMIN_USER=admin
          POSTGRES_ADMIN_PASSWORD=adminpass
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          SALES_DB=salesdb
          SALES_DB_USER=datauser
          SALES_DB_PASSWORD=datapass
          MINIO_HOST=minio
          MINIO_ROOT_USER=minio
          MINIO_ROOT_PASSWORD=minio123
          MINIO_API_PORT=9000
          MINIO_CONSOLE_PORT=9001
          MINIO_SOURCE_BUCKET=sales-data
          MINIO_ARCHIVE_BUCKET=processed-data
          AIRFLOW_FERNET_KEY=81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs=
          AIRFLOW_SECRET_KEY=ci-secret-key
          AIRFLOW_DB_USER=airflow
          AIRFLOW_DB_PASSWORD=airflow
          AIRFLOW_DB=airflow
          AIRFLOW_ADMIN_USER=admin
          AIRFLOW_ADMIN_EMAIL=admin@mdp.local
          AIRFLOW_ADMIN_PASSWORD=admin
          AIRFLOW_WEBSERVER_PORT=8080
          METABASE_DB=metabase
          METABASE_PORT=3000
          EOF

      # Only bring up the infra services needed for integration tests
      # (skip Airflow + Metabase — those are validated in the CD pipeline)
      - name: Start postgres + minio
        run: docker compose up -d postgres minio minio-init

      - name: Wait for PostgreSQL to be healthy
        run: |
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U admin -d postgres && break
            echo "  attempt $i/30 — sleeping 3s"
            sleep 3
          done
          docker compose exec -T postgres pg_isready -U admin -d postgres \
            || { echo "::error::PostgreSQL did not become healthy in time"; exit 1; }

      - name: Wait for MinIO to be healthy
        run: |
          echo "Waiting for MinIO..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break
            echo "  attempt $i/30 — sleeping 3s"
            sleep 3
          done
          curl -sf http://localhost:9000/minio/health/live \
            || { echo "::error::MinIO did not become healthy in time"; exit 1; }

      - name: Wait for minio-init to finish creating buckets
        run: |
          docker compose wait minio-init || true
          echo "MinIO init complete — checking buckets..."
          docker compose logs minio-init

      - name: Run data generator (seed MinIO)
        run: |
          docker compose run --rm data-generator
          echo "Verifying files were uploaded..."
          docker compose exec -T minio \
            sh -c 'mc alias set local http://localhost:9000 minio minio123 2>/dev/null; mc ls local/sales-data/raw/' \
            || docker compose logs data-generator

      - name: Set up Python for integration tests
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install integration test dependencies
        run: pip install minio psycopg2-binary pandas pytest python-dotenv

      - name: Run integration tests
        env:
          MINIO_API_PORT: "9000"
          POSTGRES_PORT: "5432"
        run: |
          python -m pytest tests/test_integration.py \
            -v --tb=short -s \
            --junitxml=reports/integration.xml

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: reports/

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== postgres ===" && docker compose logs postgres
          echo "=== minio ===" && docker compose logs minio
          echo "=== minio-init ===" && docker compose logs minio-init
          echo "=== data-generator ===" && docker compose logs data-generator

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans

# ── 5. SECURITY SCAN ─────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (pip-audit)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: pip install pip-audit

      # Report all vulnerabilities; exit non-zero only on HIGH/CRITICAL
      - name: Audit dependencies
        run: |
          pip-audit \
            -r requirements.txt \
            --output json \
            --format json \
            -o reports/pip-audit.json || true

      - name: Display audit results
        run: |
          if [ -f reports/pip-audit.json ]; then
            python - << 'PYEOF'
          import json, sys
          data = json.load(open("reports/pip-audit.json"))
          vulns = data.get("dependencies", [])
          found = [v for d in vulns for v in d.get("vulns", [])]
          if not found:
              print("✅  No known vulnerabilities found.")
              sys.exit(0)
          print(f"⚠️  {len(found)} vulnerability/ies found:\n")
          for v in found:
              print(f"  [{v.get('id')}] {v.get('description', '')[:120]}")
          # Fail only on CRITICAL severity to avoid flapping on low-risk CVEs
          critical = [v for v in found if "CRITICAL" in str(v)]
          if critical:
              print("\n❌  CRITICAL vulnerabilities — failing build.")
              sys.exit(1)
          print("\nℹ️  Non-critical vulnerabilities — build continues.")
          PYEOF
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: reports/pip-audit.json

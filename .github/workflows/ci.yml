name: CI — Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install flake8 pyyaml
      - run: flake8 dags/ data-generator/ --max-line-length=120 --ignore=E402,W503,E241,E221,E302,E303,E305,W292,F401
      - run: python -c "import yaml; yaml.safe_load(open('docker-compose.yml'))"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: pip install pytest faker minio pandas psycopg2-binary
      - name: Run unit tests
        run: python -m pytest tests/test_generator.py -v

  build:
    name: Build Docker Image (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      matrix:
        target: [airflow, generator]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.target }} stage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: false

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
POSTGRES_HOST=postgres
POSTGRES_PORT=5432
POSTGRES_ADMIN_USER=admin
POSTGRES_ADMIN_PASSWORD=adminpass
AIRFLOW_DB=airflow
AIRFLOW_DB_USER=airflow
AIRFLOW_DB_PASSWORD=airflow
SALES_DB=salesdb
SALES_DB_USER=datauser
SALES_DB_PASSWORD=datapass
METABASE_DB=metabase
MINIO_HOST=minio
MINIO_API_PORT=9000
MINIO_CONSOLE_PORT=9001
MINIO_ROOT_USER=minio
MINIO_ROOT_PASSWORD=minio123
MINIO_SOURCE_BUCKET=sales-data
MINIO_ARCHIVE_BUCKET=processed-data
AIRFLOW_WEBSERVER_PORT=8080
AIRFLOW_ADMIN_USER=admin
AIRFLOW_ADMIN_PASSWORD=admin
AIRFLOW_ADMIN_EMAIL=admin@ci.local
AIRFLOW_FERNET_KEY=81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs=
AIRFLOW_SECRET_KEY=a25mQ1FHTUh3MnFRSk5KMEIyVVU2YmN0VGRyYTVXY2
METABASE_PORT=3000
ENVEOF
          echo "--- .env contents ---"
          cat .env

      - name: Start PostgreSQL and MinIO
        run: |
          docker compose up -d postgres minio minio-init
          timeout 90 bash -c 'until docker inspect mdp-postgres --format="{{.State.Health.Status}}" 2>/dev/null | grep -q "healthy"; do sleep 3; done'
          echo "PostgreSQL healthy"
          timeout 60 bash -c 'until docker compose exec -T minio mc alias set local http://localhost:9000 minio minio123 2>/dev/null; do sleep 3; done'
          echo "MinIO ready"

      - name: Run data generator
        run: docker compose run --rm data-generator

      - name: Verify files in MinIO
        run: |
          docker compose exec -T minio mc alias set local http://localhost:9000 minio minio123
          COUNT=$(docker compose exec -T minio mc ls local/sales-data/raw/ | wc -l)
          echo "Files in MinIO: $COUNT"
          [ "$COUNT" -gt 0 ] || (echo "ERROR: No files in MinIO" && exit 1)

      - name: Start Airflow
        run: |
          docker compose up -d airflow-init
          timeout 180 bash -c 'until docker compose logs airflow-init 2>/dev/null | grep -q "Airflow initialised"; do sleep 5; done'
          echo "Airflow initialised"
          docker compose up -d airflow-webserver airflow-scheduler
          timeout 120 bash -c 'until curl -sf http://localhost:8080/health 2>/dev/null | grep -q "healthy"; do sleep 5; done'
          echo "Airflow webserver healthy"

      - name: Wait for DAG to be discovered
        run: |
          echo "Waiting for sales_pipeline DAG ..."
          timeout 120 bash -c 'until docker compose exec -T airflow-scheduler airflow dags list 2>/dev/null | grep -q "sales_pipeline"; do echo "  not yet ..."; sleep 10; done'
          echo "DAG discovered"

      - name: Trigger pipeline and poll for completion
        run: |
          docker compose exec -T airflow-scheduler airflow dags trigger sales_pipeline
          echo "Pipeline triggered — polling every 15s for up to 5 min ..."
          for i in $(seq 1 20); do
            sleep 15
            STATE=$(docker compose exec -T airflow-scheduler airflow dags list-runs -d sales_pipeline --no-backfill 2>/dev/null | grep "sales_pipeline" | grep -oE "success|failed|running|queued" | tail -1)
            echo "  Poll $i/20 — state: ${STATE:-unknown}"
            if [ "$STATE" = "success" ]; then
              echo "Pipeline completed successfully"
              exit 0
            elif [ "$STATE" = "failed" ]; then
              echo "ERROR: Pipeline failed — printing scheduler logs ..."
              docker compose logs --tail=80 airflow-scheduler
              exit 1
            fi
          done
          echo "ERROR: Pipeline did not complete in time"
          exit 1

      - name: Verify rows in PostgreSQL
        run: |
          ROWS=$(docker compose exec -T postgres psql -U admin -d salesdb -t -c "SELECT COUNT(*) FROM fact_sales" | xargs)
          echo "Rows in fact_sales: $ROWS"
          [ "$ROWS" -gt 0 ] || (echo "ERROR: No rows loaded" && exit 1)

      - name: Cleanup
        if: always()
        run: docker compose down -v

name: CI — Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install flake8 pyyaml
      - run: flake8 dags/ data-generator/ tests/ --max-line-length=120 --ignore=E402,W503,E241,E221,E302,E303,E305,W292,F401
      - run: python -c "import yaml; yaml.safe_load(open('docker-compose.yml'))"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install pytest faker minio pandas psycopg2-binary
      - name: Run unit tests
        run: python -m pytest tests/test_generator.py -v

  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      matrix:
        target: [airflow, generator]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: false

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          printf '%s\n' \
            "POSTGRES_HOST=postgres" \
            "POSTGRES_PORT=5432" \
            "POSTGRES_ADMIN_USER=admin" \
            "POSTGRES_ADMIN_PASSWORD=adminpass" \
            "AIRFLOW_DB=airflow" \
            "AIRFLOW_DB_USER=airflow" \
            "AIRFLOW_DB_PASSWORD=airflow" \
            "SALES_DB=salesdb" \
            "SALES_DB_USER=datauser" \
            "SALES_DB_PASSWORD=datapass" \
            "METABASE_DB=metabase" \
            "MINIO_HOST=minio" \
            "MINIO_API_PORT=9000" \
            "MINIO_CONSOLE_PORT=9001" \
            "MINIO_ROOT_USER=minio" \
            "MINIO_ROOT_PASSWORD=minio123" \
            "MINIO_SOURCE_BUCKET=sales-data" \
            "MINIO_ARCHIVE_BUCKET=processed-data" \
            "AIRFLOW_WEBSERVER_PORT=8080" \
            "AIRFLOW_ADMIN_USER=admin" \
            "AIRFLOW_ADMIN_PASSWORD=admin" \
            "AIRFLOW_ADMIN_EMAIL=admin@ci.local" \
            "AIRFLOW_FERNET_KEY=81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs=" \
            "AIRFLOW_SECRET_KEY=a25mQ1FHTUh3MnFRSk5KMEIyVVU2YmN0VGRyYTVXY2" \
            "METABASE_PORT=3000" > .env

      # ── Step 1: Start database and storage ──────────────────────────────
      - name: Start PostgreSQL and MinIO
        run: |
          docker compose up -d postgres minio minio-init
          echo "Waiting for PostgreSQL..."
          timeout 90 bash -c '
            until docker inspect mdp-postgres \
              --format="{{.State.Health.Status}}" 2>/dev/null | grep -q "healthy"; do
              sleep 3
            done'
          echo "PostgreSQL healthy"
          echo "Waiting for MinIO..."
          timeout 60 bash -c '
            until docker compose exec -T minio \
              mc alias set local http://localhost:9000 minio minio123 2>/dev/null; do
              sleep 3
            done'
          echo "MinIO ready"

      # ── Step 2: Upload data ─────────────────────────────────────────────
      - name: Generate and upload sample data
        run: |
          docker compose run --rm data-generator
          docker compose exec -T minio mc alias set local http://localhost:9000 minio minio123
          COUNT=$(docker compose exec -T minio mc ls local/sales-data/raw/ | wc -l)
          echo "Files uploaded to MinIO: $COUNT"
          [ "$COUNT" -gt 0 ] || (echo "ERROR: No files uploaded" && exit 1)

      # ── Step 3: Start Airflow ───────────────────────────────────────────
      - name: Start Airflow
        run: |
          docker compose up -d airflow-init
          echo "Waiting for Airflow DB migration..."
          timeout 180 bash -c '
            until docker compose logs airflow-init 2>/dev/null | grep -q "Airflow initialised"; do
              sleep 5
            done'
          echo "Airflow initialised"
          docker compose up -d airflow-webserver airflow-scheduler
          echo "Waiting for Airflow webserver..."
          timeout 120 bash -c '
            until curl -sf http://localhost:8080/health 2>/dev/null | grep -q "healthy"; do
              sleep 5
            done'
          echo "Airflow webserver healthy"

      # ── Step 4: Wait for DAG discovery ─────────────────────────────────
      - name: Wait for DAG discovery
        run: |
          echo "Waiting for DAGs to be discovered (max 5 min)..."
          for i in $(seq 1 30); do
            RESPONSE=$(curl -sf -u admin:admin \
              http://localhost:8080/api/v1/dags/sales_pipeline 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q "sales_pipeline"; then
              echo "sales_pipeline DAG found after $i attempt(s)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: DAG not found after 5 minutes"
              echo "--- Airflow scheduler logs ---"
              docker compose logs --tail=50 airflow-scheduler || true
              echo "--- All registered DAGs ---"
              curl -sf -u admin:admin http://localhost:8080/api/v1/dags 2>/dev/null || true
              exit 1
            fi
            echo "  attempt $i/30 — not yet registered, sleeping 10s"
            sleep 10
          done

          echo "Unpausing DAGs..."
          curl -sf -u admin:admin \
            -X PATCH http://localhost:8080/api/v1/dags/sales_pipeline \
            -H "Content-Type: application/json" \
            -d '{"is_paused": false}' > /dev/null
          curl -sf -u admin:admin \
            -X PATCH http://localhost:8080/api/v1/dags/data_flow_validation \
            -H "Content-Type: application/json" \
            -d '{"is_paused": false}' > /dev/null
          echo "DAGs unpaused and ready"

      # ── Step 5: Trigger via REST API and poll ──────────────────────────
      - name: Trigger pipeline and wait for completion
        run: |
          echo "Triggering sales_pipeline via REST API..."
          RUN_ID=$(curl -sf -u admin:admin \
            -X POST http://localhost:8080/api/v1/dags/sales_pipeline/dagRuns \
            -H "Content-Type: application/json" \
            -d "{\"conf\": {}}" | python3 -c "import sys,json; print(json.load(sys.stdin)['dag_run_id'])")
          echo "DAG run triggered: $RUN_ID"

          echo "Polling for completion every 20s (max 10 min)..."
          for i in $(seq 1 30); do
            sleep 20
            STATE=$(curl -sf -u admin:admin \
              "http://localhost:8080/api/v1/dags/sales_pipeline/dagRuns/${RUN_ID}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('state','unknown'))" 2>/dev/null)
            echo "  Poll $i/30 — state: ${STATE}"
            if [ "$STATE" = "success" ]; then
              echo "Pipeline completed successfully"
              exit 0
            elif [ "$STATE" = "failed" ]; then
              echo "ERROR: Pipeline run failed — fetching failed task details..."
              curl -sf -u admin:admin \
                "http://localhost:8080/api/v1/dags/sales_pipeline/dagRuns/${RUN_ID}/taskInstances" \
                | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for t in data.get('task_instances', []):
              if t.get('state') == 'failed':
                  print(f\"FAILED TASK: {t['task_id']} — {t.get('state')}\")
          " 2>/dev/null || true
              exit 1
            fi
          done
          echo "ERROR: Pipeline did not complete within 10 minutes"
          exit 1

      # ── Step 6: Verify data landed ─────────────────────────────────────
      - name: Verify data in PostgreSQL
        run: |
          ROWS=$(docker compose exec -T postgres \
            psql -U admin -d salesdb -t -c "SELECT COUNT(*) FROM fact_sales" | xargs)
          echo "Rows in fact_sales: $ROWS"
          [ "$ROWS" -gt 0 ] || (echo "ERROR: No rows loaded into fact_sales" && exit 1)

          PIPELINE_RUNS=$(docker compose exec -T postgres \
            psql -U admin -d salesdb -t -c "SELECT COUNT(*) FROM pipeline_runs WHERE status='success'" | xargs)
          echo "Successful pipeline runs: $PIPELINE_RUNS"

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== airflow-init ===" && docker compose logs airflow-init || true
          echo "=== airflow-scheduler ===" && docker compose logs airflow-scheduler || true
          echo "=== postgres ===" && docker compose logs postgres || true
          echo "=== data-generator ===" && docker compose logs data-generator || true

      - name: Cleanup
        if: always()
        run: docker compose down -v

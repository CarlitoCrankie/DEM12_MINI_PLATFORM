name: CD — Deploy to Test Environment

on:
  workflow_run:
    workflows: ["CI — Build & Test"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Write .env from GitHub Secrets
        run: |
          cat > .env << ENVEOF
POSTGRES_HOST=postgres
POSTGRES_PORT=5432
POSTGRES_ADMIN_USER=${{ secrets.POSTGRES_ADMIN_USER || 'admin' }}
POSTGRES_ADMIN_PASSWORD=${{ secrets.POSTGRES_ADMIN_PASSWORD || 'adminpass' }}
AIRFLOW_DB=airflow
AIRFLOW_DB_USER=${{ secrets.AIRFLOW_DB_USER || 'airflow' }}
AIRFLOW_DB_PASSWORD=${{ secrets.AIRFLOW_DB_PASSWORD || 'airflow' }}
SALES_DB=salesdb
SALES_DB_USER=${{ secrets.SALES_DB_USER || 'datauser' }}
SALES_DB_PASSWORD=${{ secrets.SALES_DB_PASSWORD || 'datapass' }}
METABASE_DB=metabase
MINIO_HOST=minio
MINIO_API_PORT=9000
MINIO_CONSOLE_PORT=9001
MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER || 'minio' }}
MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD || 'minio123' }}
MINIO_SOURCE_BUCKET=sales-data
MINIO_ARCHIVE_BUCKET=processed-data
AIRFLOW_WEBSERVER_PORT=8080
AIRFLOW_ADMIN_USER=${{ secrets.AIRFLOW_ADMIN_USER || 'admin' }}
AIRFLOW_ADMIN_PASSWORD=${{ secrets.AIRFLOW_ADMIN_PASSWORD || 'admin' }}
AIRFLOW_ADMIN_EMAIL=${{ secrets.AIRFLOW_ADMIN_EMAIL || 'admin@ci.local' }}
AIRFLOW_FERNET_KEY=${{ secrets.AIRFLOW_FERNET_KEY || '81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs=' }}
AIRFLOW_SECRET_KEY=${{ secrets.AIRFLOW_SECRET_KEY || 'a25mQ1FHTUh3MnFRSk5KMEIyVVU2YmN0VGRyYTVXY2' }}
METABASE_PORT=3000
ENVEOF

      - name: Start PostgreSQL and MinIO
        run: |
          docker compose up -d postgres minio
          timeout 120 bash -c 'until docker inspect mdp-postgres --format="{{.State.Health.Status}}" 2>/dev/null | grep -q "healthy"; do sleep 5; done'
          echo "PostgreSQL healthy"
          timeout 60 bash -c 'until docker inspect mdp-minio --format="{{.State.Health.Status}}" 2>/dev/null | grep -q "healthy"; do sleep 5; done'
          echo "MinIO healthy"

      - name: Initialise MinIO buckets
        run: |
          docker compose up -d minio-init
          timeout 30 bash -c 'until docker inspect mdp-minio-init --format="{{.State.Status}}" 2>/dev/null | grep -q "exited"; do sleep 2; done'
          echo "MinIO buckets ready"

      - name: Start Airflow
        run: |
          docker compose up -d airflow-init
          timeout 180 bash -c 'until docker compose logs airflow-init 2>/dev/null | grep -q "Airflow initialised"; do sleep 5; done'
          docker compose up -d airflow-webserver airflow-scheduler
          timeout 120 bash -c 'until curl -sf http://localhost:8080/health 2>/dev/null | grep -q "healthy"; do sleep 5; done'
          echo "Airflow ready"

      - name: Generate and upload sample data
        run: docker compose run --rm data-generator

      - name: Wait for DAG to be discovered
        run: |
          echo "Waiting for sales_pipeline DAG ..."
          timeout 120 bash -c 'until docker compose exec -T airflow-scheduler airflow dags list 2>/dev/null | grep -q "sales_pipeline"; do echo "  not yet ..."; sleep 10; done'
          echo "DAG discovered"

      - name: Trigger pipeline and poll for completion
        run: |
          docker compose exec -T airflow-scheduler airflow dags trigger sales_pipeline
          echo "Pipeline triggered — polling every 15s for up to 5 min ..."
          for i in $(seq 1 20); do
            sleep 15
            STATE=$(docker compose exec -T airflow-scheduler airflow dags list-runs -d sales_pipeline --no-backfill 2>/dev/null | grep "sales_pipeline" | grep -oE "success|failed|running|queued" | tail -1)
            echo "  Poll $i/20 — state: ${STATE:-unknown}"
            if [ "$STATE" = "success" ]; then echo "Pipeline completed"; break; fi
            if [ "$STATE" = "failed" ]; then
              docker compose logs --tail=80 airflow-scheduler
              exit 1
            fi
          done

      - name: Run data flow validation
        run: |
          docker compose exec -T airflow-scheduler airflow dags trigger data_flow_validation
          sleep 30

      - name: Print deployment report
        run: |
          SALES=$(docker compose exec -T postgres psql -U admin -d salesdb -t -c "SELECT COUNT(*) FROM fact_sales" | xargs)
          CUSTOMERS=$(docker compose exec -T postgres psql -U admin -d salesdb -t -c "SELECT COUNT(*) FROM dim_customers" | xargs)
          RUNS=$(docker compose exec -T postgres psql -U admin -d salesdb -t -c "SELECT COUNT(*) FROM pipeline_runs WHERE status='success'" | xargs)
          echo "=================================="
          echo "  DEPLOYMENT REPORT"
          echo "  fact_sales rows   : $SALES"
          echo "  dim_customers rows: $CUSTOMERS"
          echo "  Successful runs   : $RUNS"
          echo "=================================="

      - name: Cleanup
        if: always()
        run: docker compose down -v

name: CD — Deploy to Test Environment

on:
  workflow_run:
    workflows: ["CI — Build & Test"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Write .env from GitHub Secrets
        env:
          POSTGRES_ADMIN_USER: ${{ secrets.POSTGRES_ADMIN_USER || 'admin' }}
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD || 'adminpass' }}
          AIRFLOW_DB_USER: ${{ secrets.AIRFLOW_DB_USER || 'airflow' }}
          AIRFLOW_DB_PASSWORD: ${{ secrets.AIRFLOW_DB_PASSWORD || 'airflow' }}
          SALES_DB_USER: ${{ secrets.SALES_DB_USER || 'datauser' }}
          SALES_DB_PASSWORD: ${{ secrets.SALES_DB_PASSWORD || 'datapass' }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER || 'minio' }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD || 'minio123' }}
          AIRFLOW_ADMIN_USER: ${{ secrets.AIRFLOW_ADMIN_USER || 'admin' }}
          AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD || 'admin' }}
          AIRFLOW_ADMIN_EMAIL: ${{ secrets.AIRFLOW_ADMIN_EMAIL || 'admin@ci.local' }}
          AIRFLOW_FERNET_KEY: ${{ secrets.AIRFLOW_FERNET_KEY || '81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs=' }}
          AIRFLOW_SECRET_KEY: ${{ secrets.AIRFLOW_SECRET_KEY || 'a25mQ1FHTUh3MnFRSk5KMEIyVVU2YmN0VGRyYTVXY2' }}
        run: |
          printf '%s\n' \
            "POSTGRES_HOST=postgres" \
            "POSTGRES_PORT=5432" \
            "POSTGRES_ADMIN_USER=${POSTGRES_ADMIN_USER}" \
            "POSTGRES_ADMIN_PASSWORD=${POSTGRES_ADMIN_PASSWORD}" \
            "AIRFLOW_DB=airflow" \
            "AIRFLOW_DB_USER=${AIRFLOW_DB_USER}" \
            "AIRFLOW_DB_PASSWORD=${AIRFLOW_DB_PASSWORD}" \
            "SALES_DB=salesdb" \
            "SALES_DB_USER=${SALES_DB_USER}" \
            "SALES_DB_PASSWORD=${SALES_DB_PASSWORD}" \
            "METABASE_DB=metabase" \
            "MINIO_HOST=minio" \
            "MINIO_API_PORT=9000" \
            "MINIO_CONSOLE_PORT=9001" \
            "MINIO_ROOT_USER=${MINIO_ROOT_USER}" \
            "MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}" \
            "MINIO_SOURCE_BUCKET=sales-data" \
            "MINIO_ARCHIVE_BUCKET=processed-data" \
            "AIRFLOW_WEBSERVER_PORT=8080" \
            "AIRFLOW_ADMIN_USER=${AIRFLOW_ADMIN_USER}" \
            "AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD}" \
            "AIRFLOW_ADMIN_EMAIL=${AIRFLOW_ADMIN_EMAIL}" \
            "AIRFLOW_FERNET_KEY=${AIRFLOW_FERNET_KEY}" \
            "AIRFLOW_SECRET_KEY=${AIRFLOW_SECRET_KEY}" \
            "METABASE_PORT=3000" > .env

      # ── Start services ──────────────────────────────────────────────────
      - name: Start PostgreSQL and MinIO
        run: |
          docker compose up -d postgres minio
          timeout 120 bash -c '
            until docker inspect mdp-postgres \
              --format="{{.State.Health.Status}}" 2>/dev/null | grep -q "healthy"; do
              sleep 5
            done'
          echo "PostgreSQL healthy"
          timeout 60 bash -c '
            until docker inspect mdp-minio \
              --format="{{.State.Health.Status}}" 2>/dev/null | grep -q "healthy"; do
              sleep 5
            done'
          echo "MinIO healthy"

      - name: Initialise MinIO buckets
        run: |
          docker compose up -d minio-init
          timeout 30 bash -c '
            until docker inspect mdp-minio-init \
              --format="{{.State.Status}}" 2>/dev/null | grep -q "exited"; do
              sleep 2
            done'
          echo "Buckets ready"

      - name: Start Airflow
        run: |
          docker compose up -d airflow-init
          timeout 180 bash -c '
            until docker compose logs airflow-init 2>/dev/null | grep -q "Airflow initialised"; do
              sleep 5
            done'
          docker compose up -d airflow-webserver airflow-scheduler
          timeout 120 bash -c '
            until curl -sf http://localhost:8080/health 2>/dev/null | grep -q "healthy"; do
              sleep 5
            done'
          echo "Airflow ready"

      # ── Seed data ───────────────────────────────────────────────────────
      - name: Generate and upload sample data
        run: docker compose run --rm data-generator

      # ── Wait for DAG ────────────────────────────────────────────────────
      - name: Wait for DAG discovery
        run: |
          timeout 120 bash -c '
            until curl -sf -u admin:admin \
              http://localhost:8080/api/v1/dags/sales_pipeline 2>/dev/null \
              | grep -q "sales_pipeline"; do
              echo "  waiting for DAG..."
              sleep 10
            done'
          echo "DAG ready"

      # ── Trigger and poll ────────────────────────────────────────────────
      - name: Trigger pipeline and wait
        run: |
          RUN_ID=$(curl -sf -u admin:admin \
            -X POST http://localhost:8080/api/v1/dags/sales_pipeline/dagRuns \
            -H "Content-Type: application/json" \
            -d "{\"conf\": {}}" | python3 -c "import sys,json; print(json.load(sys.stdin)['dag_run_id'])")
          echo "Triggered run: $RUN_ID"

          for i in $(seq 1 30); do
            sleep 20
            STATE=$(curl -sf -u admin:admin \
              "http://localhost:8080/api/v1/dags/sales_pipeline/dagRuns/${RUN_ID}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('state','unknown'))" 2>/dev/null)
            echo "  Poll $i/30 — state: ${STATE}"
            if [ "$STATE" = "success" ]; then echo "Pipeline complete"; break; fi
            if [ "$STATE" = "failed" ]; then echo "ERROR: Pipeline failed"; exit 1; fi
          done

      # ── Validate ────────────────────────────────────────────────────────
      - name: Run data flow validation DAG
        run: |
          curl -sf -u admin:admin \
            -X POST http://localhost:8080/api/v1/dags/data_flow_validation/dagRuns \
            -H "Content-Type: application/json" \
            -d "{\"conf\": {}}"
          sleep 30
          echo "Validation DAG triggered"

      # ── Report ──────────────────────────────────────────────────────────
      - name: Deployment report
        run: |
          SALES=$(docker compose exec -T postgres psql -U admin -d salesdb -t -c "SELECT COUNT(*) FROM fact_sales" | xargs)
          CUSTOMERS=$(docker compose exec -T postgres psql -U admin -d salesdb -t -c "SELECT COUNT(*) FROM dim_customers" | xargs)
          RUNS=$(docker compose exec -T postgres psql -U admin -d salesdb -t -c "SELECT COUNT(*) FROM pipeline_runs WHERE status='success'" | xargs)
          echo "=================================="
          echo "  DEPLOYMENT REPORT"
          echo "  fact_sales rows   : $SALES"
          echo "  dim_customers rows: $CUSTOMERS"
          echo "  Successful runs   : $RUNS"
          echo "  Deployment complete"
          echo "=================================="

      - name: Cleanup
        if: always()
        run: docker compose down -v